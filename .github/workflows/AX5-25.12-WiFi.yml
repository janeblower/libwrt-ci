name: AX5-25.12-WiFi

on:
  workflow_dispatch:
  schedule:
    - cron: '0 19 * * *'   # каждый день в 19:00 UTC

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  CONFIG_FILE: configs/AX5-25.12-WiFi.config
  FIRMWARE_TAG: AX5-25.12-WiFi
  TZ: Europe/Moscow
  BUILD_DIR: /workspace   # внутри контейнера

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@master
        with:
          swap-size-mb: 1024        
          temp-reserve-mb: 100
          root-reserve-mb: 1024

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set timezone
        run: sudo timedatectl set-timezone "${{ env.TZ }}"

      - name: Configure Docker Data Root
        run: |
          sudo mkdir -p /home/runner/work/libwrt-ci/libwrt-ci/docker-data
          echo '{"data-root": "/home/runner/work/libwrt-ci/libwrt-ci/docker-data"}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Build OpenWrt in Docker
        id: docker_build
        run: |
          docker run --rm \
            -v "$(pwd):${{ env.BUILD_DIR }}" \
            -e CONFIG_FILE="${{ env.CONFIG_FILE }}" \
            -e REPO_URL="${{ env.REPO_URL }}" \
            ghcr.io/${{ github.repository_owner }}/libwrt-ci-base:25.12 \
            /bin/bash -c '
              set -euo pipefail

              echo "=== Starting OpenWrt build ==="

              if [ -f "${{ env.BUILD_DIR }}/${{ env.CONFIG_FILE }}" ]; then
                cp "${{ env.BUILD_DIR }}/${{ env.CONFIG_FILE }}" .config
                echo "Config copied from ${{ env.CONFIG_FILE }}"
              fi

              make defconfig
              make download -j8

              echo "=== Starting compilation (this may take a long time) ==="
              make -j$(nproc) || make -j1 || make -j1 V=s

              echo "=== Build completed successfully ==="

              VERSION_INFO=$(git show -s --date=short --format="Author: %an<br/>Time: %cd<br/>Content: %s<br/>Hash: %H")
              echo "VERSION_INFO=$VERSION_INFO" >> ${{ env.BUILD_DIR }}/env_file

              echo "DATE=$(date +"%Y-%m-%d %H:%M:%S")" >> ${{ env.BUILD_DIR }}/env_file
              echo "FILE_DATE=$(date +"%Y.%m.%d")" >> ${{ env.BUILD_DIR }}/env_file

              cd bin/targets/*/*
              KERNEL_VER=$(find -type f -name "*.manifest" -exec grep -oP "^kernel - \K.*?(?=~|-\d+-)" {} \; || echo "unknown")
              echo "VERSION_KERNEL=$KERNEL_VER" >> ${{ env.BUILD_DIR }}/env_file

              mkdir -p ${{ env.BUILD_DIR }}/firmware
              cp -r bin/* ${{ env.BUILD_DIR }}/firmware/

              cp .config ${{ env.BUILD_DIR }}/firmware/build.config 2>/dev/null || true

              echo "FIRMWARE_PATH=${{ env.BUILD_DIR }}/firmware" >> ${{ env.BUILD_DIR }}/env_file
              echo "compile_success" > ${{ env.BUILD_DIR }}/compile_status

              echo "Build artifacts copied to ${{ env.BUILD_DIR }}/firmware"
            '

      - name: Load environment variables
        if: always()
        run: |
          if [ -f env_file ]; then
            cat env_file >> $GITHUB_ENV
            echo "Environment variables loaded:"
            cat env_file
          else
            echo "env_file not found!"
          fi

      - name: Check compile status
        id: compile
        run: |
          if [ -f compile_status ] && grep -q "compile_success" compile_status; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "✅ Compilation completed successfully"
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "❌ Compilation failed"
            exit 1
          fi

      - name: Upload firmware as artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ env.FIRMWARE_TAG }}-${{ env.FILE_DATE || 'failed' }}
          path: firmware/
          if-no-files-found: warn
          retention-days: 7

      - name: Check disk usage
        if: always()
        run: df -hT

      - name: Create/Update GitHub Release
        if: steps.compile.outputs.status == 'success'
        uses: ncipollo/release-action@v1
        with:
          name: R${{ env.DATE || env.FILE_DATE }} — ${{ env.FIRMWARE_TAG }}
          allowUpdates: true
          tag: ${{ env.FIRMWARE_TAG }}
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: firmware/*
          replacesArtifacts: true
          body: |
            **OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**

            ### 📒 Firmware Information
            - WIFI-enabled firmware with wired NSS
            - Kernel: **${{ env.VERSION_KERNEL || 'unknown' }}**
            - Platform: ${{ env.FIRMWARE_TAG }}
            - Source: [${{ env.REPO_URL }}](${{ env.REPO_URL }})
            - Default IP: `192.168.1.1`
            - Default password: `password`

            ### 🧊 Build Details
            - Build date: ${{ env.DATE || 'unknown' }}
            - Last commit:
              ${{ env.VERSION_INFO || 'unknown' }}

            **Files are attached below.**