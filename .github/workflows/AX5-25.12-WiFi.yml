name: AX5-25.12-WiFi

on:
  workflow_dispatch:
  schedule:
    - cron: 0 19 * * *

env:
  REPO_URL: https://github.com/LiBwrt/openwrt-6.x.git
  CONFIG_FILE: configs/AX5-25.12-WiFi.config
  DIY_SCRIPT: libwrt.sh
  UPLOAD_BIN_DIR: false
  FIRMWARE_RELEASE: true
  FIRMWARE_TAG: AX5-25.12-WiFi
  TZ: Europe/Moscow

jobs:
  Build:
    runs-on: ubuntu-latest

    steps:
    - name: Check Server Performance
      run: |
        echo "Warning ⚠"
        echo "The allocated server performance is limited. If you select too many plugins, be sure to pay attention to CPU performance!"
        echo -e "Known CPU models (descending): 7763, 8370C, 8272CL, 8171M, E5-2673 \n"
        echo "--------------------------CPU Information--------------------------"
        echo "CPU Physical Count: $(cat /proc/cpuinfo | grep "physical id" | sort | uniq | wc -l)"
        echo -e "CPU Core Information: $(cat /proc/cpuinfo | grep name | cut -f2 -d: | uniq -c) \n"
        echo "--------------------------Memory Information--------------------------"
        echo "Installed Memory Details:"
        echo -e "$(sudo lshw -short -C memory | grep GiB) \n"
        echo "--------------------------Disk Information--------------------------"
        echo "Disk Count: $(ls /dev/sd* | grep -v [1-9] | wc -l)" && df -hT

    - name: Initialization Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo -E apt -yqq install dos2unix
        sudo -E apt -yqq install libfuse-dev
        sudo -E apt -yqq autoremove --purge
        sudo -E apt -yqq autoclean
        sudo -E apt -yqq clean
        sudo -E systemctl daemon-reload
        sudo timedatectl set-timezone "$TZ"

    - name: Combine Disks
      uses: easimon/maximize-build-space@master
      with:
        swap-size-mb: 1024
        temp-reserve-mb: 100
        root-reserve-mb: 1024

    - name: Checkout
      uses: actions/checkout@main

    - name: Configure Docker Data Root
      run: |
        sudo mkdir -p /home/runner/work/libwrt-ci/libwrt-ci/docker-data
        echo '{"data-root": "/home/runner/work/libwrt-ci/libwrt-ci/docker-data"}' | sudo tee /etc/docker/daemon.json
        sudo systemctl restart docker

    - name: Prepare Build Environment in Container
      run: |
        docker run --rm -v $(pwd):/workspace -e CONFIG_FILE="$CONFIG_FILE" -e REPO_URL="$REPO_URL" ghcr.io/${{ github.repository_owner }}/libwrt-ci-base:25.12 /bin/bash -c "
        set -e
        cd /openwrt
        VERSION_INFO=\$(git show -s --date=short --format='Author: %an<br/>Time: %cd<br/>Content: %s<br/>hash: %H')
        echo \"VERSION_INFO=\$VERSION_INFO\" >> /workspace/env_file
        cp /workspace/\$CONFIG_FILE /openwrt/.config
        make defconfig > /dev/null 2>&1
        SOURCE_REPO=\"\$(echo \$REPO_URL | awk -F '/' '{print \$(NF)}')\"
        echo \"SOURCE_REPO=\$SOURCE_REPO\" >> /workspace/env_file
        DEVICE_TARGET=\$(cat .config | grep CONFIG_TARGET_BOARD | awk -F '\"' '{print \$2}')
        echo \"DEVICE_TARGET=\$DEVICE_TARGET\" >> /workspace/env_file
        DEVICE_SUBTARGET=\$(cat .config | grep CONFIG_TARGET_SUBTARGET | awk -F '\"' '{print \$2}')
        echo \"DEVICE_SUBTARGET=\$DEVICE_SUBTARGET\" >> /workspace/env_file
        "

    - name: Load Configuration and Download Packages in Container
      run: |
        docker run --rm -v $(pwd):/workspace -e CONFIG_FILE="$CONFIG_FILE" -e DIY_SCRIPT="$DIY_SCRIPT" ghcr.io/${{ github.repository_owner }}/libwrt-ci-base:25.12 /bin/bash -c "
        set -e
        cd /openwrt
        [ -e /workspace/files ] && mv /workspace/files /openwrt/files
        [ -e /workspace/\$CONFIG_FILE ] && mv /workspace/\$CONFIG_FILE /openwrt/.config
        chmod +x /workspace/\$DIY_SCRIPT
        /workspace/\$DIY_SCRIPT
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;
        "

    - name: Compile Firmware and Organize Output in Container
      run: |
        docker run --rm -v $(pwd):/workspace ghcr.io/${{ github.repository_owner }}/libwrt-ci-base:25.12 /bin/bash -c "
        set -e
        cd /openwrt
        echo -e \"\$(nproc) thread compile\"
        make -j\$(nproc) || make -j1 || make -j1 V=s
        echo \"compile_success\" >> /workspace/compile_status
        echo \"DATE=\$(date +'%Y-%m-%d %H:%M:%S')\" >> /workspace/env_file
        echo \"FILE_DATE=\$(date +'%Y.%m.%d')\" >> /workspace/env_file
        cd /openwrt/bin/targets/*/*
        cat sha256sums
        VERSION_KERNEL=\$(find -type f -name \"*.manifest\" -exec grep -oP '^kernel - \K.*?(?=~|-\d+-)' {} \;)
        echo \"VERSION_KERNEL=\$VERSION_KERNEL\" >> /workspace/env_file
        cp /openwrt/.config build.config
        mv -f /openwrt/bin/packages/*/*/*.apk packages 2>/dev/null || true
        tar -zcf Packages.tar.gz packages 2>/dev/null || true
        rm -rf packages feeds.buildinfo version.buildinfo 2>/dev/null || true
        mkdir -p /workspace/bin
        cp -r /openwrt/bin/* /workspace/bin/
        cd /workspace/bin/targets/*/*
        echo \"FIRMWARE_PATH=\$(pwd)\" >> /workspace/env_file
        "

    - name: Set Environment Variables
      run: |
        cat env_file >> $GITHUB_ENV

    - name: Set Compile Status
      id: compile
      run: |
        if [ -f compile_status ]; then
          echo "status=success" >> $GITHUB_OUTPUT
        else
          echo "status=failure" >> $GITHUB_OUTPUT
        fi

    - name: Check Space Usage
      if: (!cancelled())
      run: df -hT

    - name: Upload Bin Directory
      if: steps.compile.outputs.status == 'success' && env.UPLOAD_BIN_DIR == 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.SOURCE_REPO }}-bin-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.FILE_DATE }}
        path: bin

    - name: Upload Firmware To Artifact
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE != 'true'
      uses: actions/upload-artifact@main
      with:
        name: ${{ env.SOURCE_REPO }}-firmware-${{ env.DEVICE_TARGET }}-${{ env.DEVICE_SUBTARGET }}-${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE_PATH }}

    - name: Upload Firmware To Release
      if: steps.compile.outputs.status == 'success' && env.FIRMWARE_RELEASE == 'true'
      uses: ncipollo/release-action@v1
      with:
        name: R${{ env.DATE }} for ${{ env.FIRMWARE_TAG }}
        allowUpdates: true
        tag: ${{ env.FIRMWARE_TAG }}
        token: ${{ secrets.GITHUB_TOKEN }}
        artifacts: ${{ env.FIRMWARE_PATH }}/*
        body: |
          **This is OpenWrt Firmware for ${{ env.FIRMWARE_TAG }}**
          ### 📒 Firmware Information (WIFI)
          - WIFI-enabled firmware with wired NSS on 6.12 kernel
          - 💻 This is the OpenWrt firmware used for the ${{ env.FIRMWARE_TAG }} platform
          - ⚽ Firmware source: ${{ env.REPO_URL }}
          - 💝 Source branch: ${{ env.REPO_BRANCH }}
          - 🌐 Default address: 192.168.1.1
          - 🔑 Default password: password
          ### 🧊 Firmware Version
          - Firmware kernel version: ${{ env.VERSION_KERNEL }}
          - Last update record of [main source](${{ env.REPO_URL }}) before firmware compilation
          - ${{ env.VERSION_INFO }}
